apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-app-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Attestry/attestry-infra.git'
    targetRevision: HEAD
    path: k8s-manifests/apps/ledger-app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: attestry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
