apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-config
  namespace: attestry
data:
  SPRING_PROFILES_ACTIVE: dev
  SERVER_PORT: "8081"
  # User action required: fill from `terraform -chdir=terraform output -raw rds_jdbc_url`
  DB_URL: jdbc:postgresql://attestry-dev-postgres.cvmogq088lqo.ap-northeast-2.rds.amazonaws.com:5432/attestry_dev
  # User action required: fill from `terraform -chdir=terraform output -raw rds_db_username`
  DB_USERNAME: attestry_admin
  LEDGER_DB_SCHEMA: ledger
  KAFKA_BOOTSTRAP_SERVERS: attestry-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
  KAFKA_CLIENT_ID: ledger-service
  LEDGER_KAFKA_ENABLED: "true"
  LEDGER_KAFKA_CONSUMER_GROUP: attestry-ledger-dev
  LEDGER_KAFKA_LISTENER_CONCURRENCY: "2"
  LEDGER_KAFKA_TOPIC_AUTO_CREATE_ENABLED: "false"
  KAFKA_TOPIC_LEDGER_OUTBOX: ledger.outbox.v1
  KAFKA_TOPIC_LEDGER_DLQ: ledger.outbox.v1.dlq
  KAFKA_TOPIC_PRODUCT_PROJECTION: product.projection.v1
  KAFKA_TOPIC_PRODUCT_PROJECTION_DLQ: product.projection.v1.dlq
  KAFKA_TOPIC_PARTITIONS: "3"
  KAFKA_TOPIC_REPLICAS: "3"
  KAFKA_OUTBOX_BATCH_SIZE: "100"
  KAFKA_OUTBOX_MAX_RETRIES: "5"
  KAFKA_OUTBOX_PUBLISH_INTERVAL_MS: "2000"
  LEDGER_INTEGRITY_CHECK_ENABLED: "false"
  LEDGER_INTEGRITY_CHECK_CRON: 0 0 4 * * *
  LEDGER_OUTBOX_CLEANUP_RETENTION_DAYS: "7"
  LEDGER_OUTBOX_CLEANUP_CRON: 0 30 3 * * *
