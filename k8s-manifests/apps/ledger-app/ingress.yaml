apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ledger
  namespace: attestry
  labels:
    app.kubernetes.io/name: ledger
    app.kubernetes.io/part-of: attestry
spec:
  rules:
    - host: ledger.dev.attestry.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ledger
                port:
                  number: 80
