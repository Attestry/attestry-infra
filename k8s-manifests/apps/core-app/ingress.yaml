apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core
  namespace: attestry
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: attestry
spec:
  rules:
    - host: api.dev.attestry.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: core
                port:
                  number: 80
