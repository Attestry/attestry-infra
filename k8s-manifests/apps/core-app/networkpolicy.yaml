apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: core-egress
  namespace: attestry
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: core
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 9092
        - protocol: TCP
          port: 9093
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
