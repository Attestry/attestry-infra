apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: core
  namespace: attestry
  labels:
    app.kubernetes.io/name: core
    app.kubernetes.io/part-of: attestry
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: core
  namespaceSelector:
    matchNames:
      - attestry
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
