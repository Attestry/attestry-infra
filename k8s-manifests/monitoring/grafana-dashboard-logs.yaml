apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  logs.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Core Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{
            "expr": "{namespace=\"attestry\", app_kubernetes_io_name=\"core\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "Ledger Logs",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 12 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{
            "expr": "{namespace=\"attestry\", app_kubernetes_io_name=\"ledger\"}",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        },
        {
          "title": "ERROR Logs (All Services)",
          "type": "logs",
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 24 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [{
            "expr": "{namespace=\"attestry\"} |= \"ERROR\"",
            "refId": "A"
          }],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["attestry", "logs", "loki"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Attestry — Application Logs",
      "uid": "attestry-application-logs"
    }
