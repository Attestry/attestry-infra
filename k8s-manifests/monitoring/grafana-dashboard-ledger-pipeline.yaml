apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-ledger-pipeline
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ledger-pipeline.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Kafka Consume Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "targets": [{ "expr": "rate(ledger_kafka_consume_count_total[5m])", "legendFormat": "consume" }],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "title": "Kafka Consume Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "targets": [{ "expr": "ledger_kafka_consume_duration", "legendFormat": "duration" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "Kafka Consume Lag",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "targets": [{ "expr": "ledger_kafka_consume_lag", "legendFormat": "lag" }]
        },
        {
          "title": "DLQ Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 8 },
          "targets": [{ "expr": "rate(outbox_dlq_count_total[5m])", "legendFormat": "DLQ" }],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "title": "Ledger Append Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 8 },
          "targets": [{ "expr": "rate(ledger_append_count_total[5m])", "legendFormat": "append" }],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "title": "Ledger Append Duration",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 8 },
          "targets": [{ "expr": "ledger_append_duration", "legendFormat": "duration" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "Integrity Check Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            { "expr": "rate(ledger_integrity_check_total[5m])", "legendFormat": "{{ result }}" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } }
        },
        {
          "title": "Integrity Invalid (1h)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [{ "expr": "increase(ledger_integrity_check_total{result=\"invalid\"}[1h])", "legendFormat": "invalid" }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["attestry", "ledger", "consume", "integrity"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Attestry — Ledger Event Pipeline",
      "uid": "attestry-ledger-pipeline"
    }
