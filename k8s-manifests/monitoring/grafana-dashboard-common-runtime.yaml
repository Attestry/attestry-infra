apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-common-runtime
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  common-runtime.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Scrape Target Up/Down",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "up{job=~\"core|ledger\"}", "legendFormat": "{{ job }}" }],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ]
            }
          }
        },
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{ "expr": "sum(rate(http_server_requests_seconds_count[5m])) by (job)", "legendFormat": "{{ job }}" }]
        },
        {
          "title": "HTTP Error Rate (4xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 4 },
          "targets": [{ "expr": "sum(rate(http_server_requests_seconds_count{status=~\"4..\"}[5m])) by (job)", "legendFormat": "{{ job }} 4xx" }]
        },
        {
          "title": "HTTP Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 4 },
          "targets": [{ "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) by (job)", "legendFormat": "{{ job }} 5xx" }]
        },
        {
          "title": "HTTP Latency P95",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le))", "legendFormat": "{{ job }} p95" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "HTTP Latency P99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{ "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (job, le))", "legendFormat": "{{ job }} p99" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "JVM Heap Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            { "expr": "jvm_memory_used_bytes{area=\"heap\"}", "legendFormat": "{{ job }} used" },
            { "expr": "jvm_memory_max_bytes{area=\"heap\"}", "legendFormat": "{{ job }} max" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "title": "JVM GC Pause",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [{ "expr": "rate(jvm_gc_pause_seconds_sum[5m])", "legendFormat": "{{ job }} {{ action }}" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "targets": [{ "expr": "process_cpu_usage{job=~\"core|ledger\"}", "legendFormat": "{{ job }}" }],
          "fieldConfig": { "defaults": { "unit": "percentunit" } }
        },
        {
          "title": "Pod Restart Count",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "targets": [{ "expr": "increase(kube_pod_container_status_restarts_total{namespace=\"attestry\"}[1h])", "legendFormat": "{{ pod }}" }]
        }
      ],
      "schemaVersion": 39,
      "tags": ["attestry", "common"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Attestry — Common Runtime",
      "uid": "attestry-common-runtime"
    }
